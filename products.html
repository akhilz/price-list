<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f4a1.png" type="image/png">
    <title>Price List - Elixir Solutions</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (SiteConfig.pageTitle) document.title = SiteConfig.pageTitle + " - Product Catalog";
            document.querySelectorAll('[data-config]').forEach(el => {
                const key = el.getAttribute('data-config');
                if (SiteConfig[key]) el.innerHTML = SiteConfig[key];
            });
        });
    </script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb", // Professional Tech Blue
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        logo: ["Dancing Script", "cursive"],
                        heading: ["Oswald", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                    },
                },
            },
        };
    </script>
    <style>
        .logo-text-script {
            font-family: 'Dancing Script', cursive;
        }

        .logo-text-bold {
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.1em;
        }

        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <header
        class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <div class="relative">
                    <span class="material-icons text-primary text-3xl">lightbulb</span>
                    <div class="absolute -top-1 -right-1 w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                </div>
                <div class="flex flex-col leading-none">
                    <span class="logo-text-script text-xl text-primary leading-tight"
                        data-config="companyNameFirst">elixir</span>
                    <span class="logo-text-bold text-lg text-slate-700 dark:text-slate-300 uppercase leading-none"
                        data-config="companyNameSecond">Solutions</span>
                </div>
            </a>
            <nav class="hidden md:flex items-center gap-6">
                <a href="index.html"
                    class="flex items-center gap-2 font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                    <span class="material-icons text-[20px]">home</span> Home
                </a>
                <a href="products.html" class="flex items-center gap-2 font-bold text-primary">
                    <span class="material-icons text-[20px]">inventory_2</span> Catalog
                </a>
            </nav>
            <button id="mobileMenuBtn" onclick="toggleMobileMenu()"
                class="md:hidden flex items-center p-2 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                <span class="material-icons text-2xl">menu</span>
            </button>
        </div>
        <!-- Mobile Dropdown Menu -->
        <div id="mobileMenu"
            class="hidden md:hidden border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-background-dark px-4 py-2 shadow-lg">
            <nav class="flex flex-col space-y-2 pb-3 pt-2">
                <a href="index.html"
                    class="flex items-center gap-3 font-medium text-slate-600 dark:text-slate-400 hover:text-primary transition-colors px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg">
                    <span class="material-icons text-[20px]">home</span> Home
                </a>
                <a href="products.html"
                    class="flex items-center gap-3 font-bold text-primary px-3 py-2 bg-primary/5 rounded-lg">
                    <span class="material-icons text-[20px]">inventory_2</span> Catalog
                </a>
            </nav>
        </div>
    </header>
    <main class="max-w-5xl mx-auto pb-24 md:pb-8">
        <section class="px-4 py-2 mt-2">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-4 gap-3">
                <h2 class="text-lg md:text-xl font-bold whitespace-nowrap mb-2 md:mb-0">Component Price List</h2>
                <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
                    <!-- Expanding Search -->
                    <div id="inlineSearchContainer"
                        class="relative hidden w-full md:w-auto md:flex-1 min-w-[150px] transition-all duration-300">
                        <input type="text" id="searchInput" onkeyup="filterProducts()"
                            placeholder="Search components..."
                            class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-2 pl-8 pr-8 text-xs sm:text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm text-slate-900 dark:text-slate-100 placeholder-slate-400">
                        <span
                            class="material-icons absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-[16px]">search</span>
                        <button onclick="clearSearch()"
                            class="absolute right-1 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center justify-center">
                            <span class="material-icons text-[14px]">close</span>
                        </button>
                    </div>

                    <!-- Search Toggle Button -->
                    <button id="searchToggleButton" onclick="toggleSearch()"
                        class="flex items-center justify-center gap-1 sm:gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300 font-bold py-2 px-3 sm:px-4 rounded-lg shadow-sm transition-colors text-xs sm:text-sm shrink-0">
                        <span class="material-icons text-[18px]">search</span> <span
                            class="hidden sm:inline">Search</span>
                    </button>

                    <!-- Category Dropdown -->
                    <div class="relative flex-1 md:flex-none min-w-[140px] md:w-48 shrink-0">
                        <select id="categorySelect" onchange="filterProducts()"
                            class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-2 pl-8 pr-6 text-xs sm:text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm transition-all text-slate-900 dark:text-slate-100 appearance-none bg-no-repeat bg-[right_0.5rem_center] bg-[length:1em_1em]"
                            style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2394a3b8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');">
                            <option value="">All Categories</option>
                        </select>
                        <span
                            class="material-icons absolute left-2 top-[7px] text-slate-400 text-[16px] pointer-events-none">category</span>
                    </div>

                    <!-- PDF Download -->
                    <button onclick="downloadPDF()" title="Download PDF"
                        class="flex items-center justify-center w-[34px] h-[34px] sm:w-[38px] sm:h-[38px] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300 rounded-lg shadow-sm transition-colors shrink-0">
                        <span class="material-icons text-[18px]">picture_as_pdf</span>
                    </button>
                </div>
            </div>
            <div id="productList" class="flex flex-col gap-1.5">
                <!-- Items injected here -->
            </div>
            <div id="noResults" class="hidden text-center py-12 text-slate-500">
                <span class="material-icons text-5xl mb-3 opacity-50">search_off</span>
                <p>No matching components found.</p>
            </div>
        </section>
    </main>

    <script>
        async function loadPriceList() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const productList = document.getElementById("productList");
                productList.innerHTML = "";

                // Populate categories dynamically
                const categories = [...new Set(data.map(item => item.category).filter(Boolean))];
                const categorySelect = document.getElementById("categorySelect");
                categories.forEach(category => {
                    const option = document.createElement("option");
                    option.value = category.toLowerCase();
                    option.textContent = category;
                    categorySelect.appendChild(option);
                });

                data.forEach(item => {
                    const listItem = `
                        <div class="product-item bg-white dark:bg-slate-800 py-1.5 px-3 rounded-lg border border-slate-100 dark:border-slate-700 shadow-sm flex items-center justify-between gap-2.5 transition-colors hover:bg-slate-50 dark:hover:bg-slate-700/50" data-category="${(item.category || '').toLowerCase()}">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-1.5 mb-0.5">
                                    <h3 class="font-bold text-slate-900 dark:text-white text-xs sm:text-sm truncate">${item.model}</h3>
                                    <span class="px-1 py-[1px] bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-200 text-[9px] font-bold rounded uppercase tracking-wider whitespace-nowrap leading-none">${item.quality}</span>
                                </div>
                                <p class="text-[11px] sm:text-xs text-slate-500 dark:text-slate-400 truncate leading-tight">${item.part}</p>
                            </div>
                            <div class="text-right whitespace-nowrap pl-2 border-l border-slate-100 dark:border-slate-700/50">
                                <span class="block text-[9px] text-slate-400 uppercase tracking-widest leading-none mb-0.5">Price</span>
                                <span class="text-sm font-bold text-primary leading-none block">${item.price}</span>
                            </div>
                        </div>
                    `;
                    productList.innerHTML += listItem;
                });
            } catch (error) {
                console.error("Error loading the price list:", error);
                document.getElementById("productList").innerHTML = `
                    <div class="text-center text-red-500 bg-red-50 dark:bg-red-500/10 p-4 rounded-xl">
                        <strong>Error:</strong> Could not load data.json. <br>
                        If you opened this file directly from your computer (<code>file://</code> URL), your browser is blocking the request due to CORS security policies. <br>
                        Please run a local web server, or deploy to GitHub Pages.
                    </div>
                `;
            }
        }

        function toggleSearch() {
            const container = document.getElementById("inlineSearchContainer");
            const btn = document.getElementById("searchToggleButton");

            if (container.classList.contains("hidden")) {
                container.classList.remove("hidden");
                btn.classList.add("hidden");
                document.getElementById("searchInput").focus();
            } else {
                container.classList.add("hidden");
                btn.classList.remove("hidden");
                document.getElementById("searchInput").value = "";
                filterProducts();
            }
        }

        function clearSearch() {
            const input = document.getElementById("searchInput");
            if (input.value === "") {
                toggleSearch(); // close if it's already empty
            } else {
                input.value = "";
                filterProducts();
                input.focus();
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById("mobileMenu");
            const btnIcon = document.querySelector("#mobileMenuBtn .material-icons");
            if (menu.classList.contains("hidden")) {
                menu.classList.remove("hidden");
                btnIcon.textContent = "close";
            } else {
                menu.classList.add("hidden");
                btnIcon.textContent = "menu";
            }
        }

        function filterProducts() {
            const searchFilter = document.getElementById("searchInput").value.toUpperCase();
            const categoryFilter = document.getElementById("categorySelect").value.toLowerCase();
            const items = document.querySelectorAll(".product-item");
            let found = false;

            items.forEach(item => {
                const model = item.querySelector("h3").textContent.toUpperCase();
                const part = item.querySelector("p").textContent.toUpperCase();
                const itemCategory = item.getAttribute("data-category") || "";

                const matchesSearch = model.indexOf(searchFilter) > -1 || part.indexOf(searchFilter) > -1;
                const matchesCategory = categoryFilter === "" || itemCategory === categoryFilter;

                if (matchesSearch && matchesCategory) {
                    item.style.display = "";
                    found = true;
                } else {
                    item.style.display = "none";
                }
            });
            document.getElementById("noResults").classList.toggle("hidden", found || items.length === 0);
        }

        function downloadPDF() {
            const element = document.getElementById('productList');

            // Create a temporary header for the PDF
            const headerDiv = document.createElement('div');
            headerDiv.id = "pdfHeader";
            headerDiv.className = "mb-6 pb-4 border-b-2 border-slate-800 text-center";

            const now = new Date();
            const dateString = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            const timeString = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            headerDiv.innerHTML = `
                <h1 style="font-size: 24px; font-weight: bold; margin-bottom: 4px; color: #0f172a;">${SiteConfig.companyNameFirst} ${SiteConfig.companyNameSecond}</h1>
                <p style="font-size: 11px; color: #475569; margin-bottom: 2px;">SCO 7, Opp. Amar Ashram, Near Lower Mall, PATIALA-147001</p>
                <p style="font-size: 11px; color: #475569; margin-bottom: 8px;">Phone: ${SiteConfig.phone1} | ${SiteConfig.phone2}</p>
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: #64748b; margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 4px;">
                    <span>Price List Generated On: ${dateString} at ${timeString}</span>
                </div>
            `;

            // Prepend header to the list
            element.insertBefore(headerDiv, element.firstChild);

            const opt = {
                margin: [10, 10, 10, 10], // Top, Left, Bottom, Right
                filename: SiteConfig.pdfFileName || 'Elixir_Solutions_Price_List.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Remove gap classes temporarily so it prints tighter
            const originalClasses = element.className;
            element.className = 'flex flex-col gap-0.5';

            html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
                var totalPages = pdf.internal.getNumberOfPages();
                for (var i = 1; i <= totalPages; i++) {
                    pdf.setPage(i);
                    pdf.setFontSize(48);

                    // Make watermark highly transparent and light
                    pdf.setGState(new pdf.GState({ opacity: 0.1 }));
                    pdf.setTextColor(200, 200, 200);

                    const watermarkText = SiteConfig.pdfWatermark || 'Elixir Solutions';
                    pdf.text(watermarkText, 50, 100, { angle: 45 });
                    pdf.text(watermarkText, 50, 200, { angle: 45 });

                    // Restore opacity for any future operations just in case
                    pdf.setGState(new pdf.GState({ opacity: 1.0 }));
                }
            }).save().then(() => {
                // Restore classes and remove the header after generation
                element.className = originalClasses;
                const addedHeader = document.getElementById("pdfHeader");
                if (addedHeader) addedHeader.remove();
            });
        }

        loadPriceList();
    </script>
</body>

</html>
